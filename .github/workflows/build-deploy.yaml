name: Build and Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Build (type check)
        run: pnpm build

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* vars must be present at `next build` time — they're
          # inlined into the client bundle. These are non-secret (visible in
          # the browser anyway), so hardcoding the production URLs here is
          # fine. To override per environment, switch to ${{ vars.* }}.
          build-args: |
            NEXT_PUBLIC_APP_URL=https://app.openeos.de
            NEXT_PUBLIC_API_URL=https://api.openeos.de
            NEXT_PUBLIC_DOCS_URL=https://docs.openeos.de
            NEXT_PUBLIC_CONTACT_EMAIL=hello@openeos.de
            NEXT_PUBLIC_DEMO_EMAIL=hello@openeos.de

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Determine SSH port
        id: ssh-port
        run: echo "port=${DEPLOY_PORT:-22}" >> "$GITHUB_OUTPUT"
        env:
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

      - name: Update production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ steps.ssh-port.outputs.port }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            docker compose pull ${{ vars.DEPLOY_SERVICE }}
            docker compose up -d ${{ vars.DEPLOY_SERVICE }}
            docker image prune -f
